<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="The Sacred Cycle">
<meta name="theme-color" content="#fdf0ee">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<title>The Sacred Cycle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --brand: #b05a52;
  --brand-dark: #8a3e38;
  --brand-light: #d4877f;
  --bg: #fdf0ee;
  --bg2: #fae6e3;
  --text: #2c1a18;
  --text2: #6b3d38;
  --text3: #9a6460;
  --white: #fff;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 2px 16px rgba(176,90,82,0.10);
  --shadow-md: 0 4px 24px rgba(176,90,82,0.16);
  /* phase colors */
  --mens-color: #b05a52; --mens-bg: #fdf0ee;
  --foll-color: #5a8a6a; --foll-bg: #f0f5f0;
  --ovul-color: #b8832a; --ovul-bg: #fdf6ec;
  --lut-color: #6a5a9a; --lut-bg: #f3f0f8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Jost',sans-serif;font-weight:300;overflow:hidden;}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative;}

/* ── SYNC DOT ── */
#sync-dot{position:fixed;top:calc(env(safe-area-inset-top)+8px);left:12px;width:8px;height:8px;border-radius:50%;background:#ccc;z-index:9999;transition:background .3s;opacity:0;}
#sync-dot.saving{background:#f0b429;opacity:1;}
#sync-dot.saved{background:#4caf50;opacity:1;}
#sync-dot.error{background:#e53935;opacity:1;}

/* ── OVERLAY SCREENS ── */
.overlay{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;overflow-y:auto;}
.overlay.hidden{display:none;}

/* AUTH */
.auth-logo{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:300;color:var(--brand);letter-spacing:.04em;margin-bottom:4px;}
.auth-tagline{font-size:.8rem;color:var(--text3);letter-spacing:.12em;text-transform:lowercase;margin-bottom:40px;}
.auth-card{width:100%;background:var(--white);border-radius:var(--radius);padding:28px 24px;box-shadow:var(--shadow-md);}
.auth-tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid var(--bg2);}
.auth-tab{flex:1;padding:10px;text-align:center;font-size:.8rem;letter-spacing:.1em;text-transform:lowercase;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;}
.auth-tab.active{color:var(--brand);border-bottom-color:var(--brand);}
.auth-input{width:100%;border:1px solid var(--bg2);border-radius:var(--radius-sm);padding:13px 14px;font-family:'Jost',sans-serif;font-size:.95rem;font-weight:300;color:var(--text);background:var(--bg);outline:none;transition:border .2s;margin-bottom:12px;}
.auth-input:focus{border-color:var(--brand-light);}
.auth-input::placeholder{color:var(--text3);}
.btn-brand{width:100%;padding:14px;background:var(--brand);color:var(--white);border:none;border-radius:var(--radius-sm);font-family:'Jost',sans-serif;font-size:.85rem;letter-spacing:.12em;text-transform:lowercase;cursor:pointer;transition:background .2s;}
.btn-brand:hover{background:var(--brand-dark);}
.auth-forgot{text-align:center;margin-top:14px;font-size:.78rem;color:var(--text3);cursor:pointer;text-decoration:underline;}
.auth-msg{font-size:.82rem;color:var(--brand);text-align:center;margin-bottom:12px;min-height:18px;}
.auth-msg.error{color:#c0392b;}

/* ONBOARDING */
.ob-step{width:100%;max-width:380px;}
.ob-step-num{font-size:.72rem;letter-spacing:.16em;color:var(--text3);text-transform:lowercase;margin-bottom:8px;}
.ob-title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:var(--brand);line-height:1.2;margin-bottom:10px;}
.ob-sub{font-size:.85rem;color:var(--text2);line-height:1.6;margin-bottom:28px;}
.ob-label{font-size:.78rem;letter-spacing:.1em;text-transform:lowercase;color:var(--text3);margin-bottom:6px;display:block;}
.ob-input{width:100%;border:1px solid var(--bg2);border-radius:var(--radius-sm);padding:13px 14px;font-family:'Jost',sans-serif;font-size:.95rem;font-weight:300;color:var(--text);background:var(--white);outline:none;transition:border .2s;margin-bottom:16px;}
.ob-input:focus{border-color:var(--brand-light);}
.ob-dots{display:flex;gap:6px;justify-content:center;margin-bottom:28px;}
.ob-dot{width:7px;height:7px;border-radius:50%;background:var(--bg2);}
.ob-dot.active{background:var(--brand);}
.btn-ob{padding:14px 36px;background:var(--brand);color:var(--white);border:none;border-radius:var(--radius-sm);font-family:'Jost',sans-serif;font-size:.85rem;letter-spacing:.12em;text-transform:lowercase;cursor:pointer;transition:background .2s;}
.btn-ob:hover{background:var(--brand-dark);}

/* ── MAIN APP ── */
#app{display:flex;flex-direction:column;height:100%;overflow:hidden;}
#app.hidden{display:none;}

/* HEADER */
#header{padding:calc(env(safe-area-inset-top)+14px) 20px 12px;background:var(--bg);flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between;position:relative;}
.header-titles{flex:1;}
.header-greeting{font-size:.72rem;letter-spacing:.14em;text-transform:lowercase;color:var(--text3);}
.header-appname{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:400;color:var(--brand);line-height:1.1;margin-top:1px;}
.header-right{display:flex;align-items:center;gap:8px;padding-top:4px;}
.profile-btn{width:34px;height:34px;border-radius:50%;background:var(--bg2);border:1.5px solid var(--brand-light);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;}

/* PROFILE MENU */
#profile-menu{position:fixed;top:0;left:0;right:0;max-width:430px;margin:0 auto;background:var(--white);border-radius:0 0 var(--radius) var(--radius);box-shadow:var(--shadow-md);z-index:100;padding:calc(env(safe-area-inset-top)+60px) 20px 20px;transform:translateY(-110%);transition:transform .3s ease;}
#profile-menu.open{transform:translateY(0);}
.pm-email{font-size:.8rem;color:var(--text3);margin-bottom:16px;letter-spacing:.05em;}
.pm-item{padding:13px 0;border-bottom:1px solid var(--bg2);font-size:.85rem;letter-spacing:.06em;text-transform:lowercase;cursor:pointer;color:var(--text2);}
.pm-item:last-child{border-bottom:none;color:var(--brand);}
#profile-overlay{position:fixed;inset:0;z-index:99;display:none;}
#profile-overlay.open{display:block;}

/* PHASE BADGE AREA */
#phase-bar-wrap{padding:0 20px 10px;flex-shrink:0;}
.phase-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:.75rem;letter-spacing:.08em;text-transform:lowercase;font-weight:400;margin-bottom:6px;}
.season-badge{display:inline-flex;align-items:center;gap:4px;font-size:.72rem;color:var(--text3);letter-spacing:.06em;text-transform:lowercase;margin-left:8px;}
.fertile-banner{width:100%;background:linear-gradient(90deg,#fdf6ec,#fff9f2);border:1px solid #f0c060;border-radius:8px;padding:6px 12px;font-size:.76rem;color:#b8832a;text-align:center;margin-bottom:6px;letter-spacing:.04em;}
.progress-bar{width:100%;height:6px;border-radius:3px;background:var(--bg2);overflow:visible;position:relative;margin-top:4px;}
.progress-fill{height:100%;border-radius:3px;transition:width .4s;}
.progress-dot{width:12px;height:12px;border-radius:50%;background:var(--white);border:2px solid currentColor;position:absolute;top:50%;transform:translate(-50%,-50%);transition:left .4s;}

/* TAB BAR */
#tab-bar{padding:8px 20px calc(env(safe-area-inset-bottom)+8px);background:var(--white);border-top:1px solid var(--bg2);display:flex;justify-content:space-around;flex-shrink:0;}
.tab-btn{flex:1;padding:8px 4px;text-align:center;font-size:.72rem;letter-spacing:.1em;text-transform:lowercase;color:var(--text3);cursor:pointer;border:none;background:none;font-family:'Jost',sans-serif;transition:color .2s;}
.tab-btn.active{color:var(--brand);font-weight:500;}
.tab-icon{font-size:1.1rem;display:block;margin-bottom:2px;}

/* SCROLL AREA */
#tab-content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}

/* ── CARDS + BLOCKS ── */
.tab-pane{padding:16px 20px 100px;display:none;}
.tab-pane.active{display:block;}
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;}
.card-header{padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:.72rem;letter-spacing:.14em;text-transform:lowercase;color:var(--text3);}
.card-body{padding:14px 16px;}
.chip{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:20px;font-size:.78rem;letter-spacing:.04em;text-transform:lowercase;border:1px solid var(--bg2);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .2s;margin:3px;}
.chip.selected{background:var(--brand);color:var(--white);border-color:var(--brand);}
.chip-sm{padding:4px 9px;font-size:.73rem;}

/* AFFIRMATION */
.aff-quote{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-style:italic;font-weight:300;line-height:1.6;color:var(--text);padding:6px 0 10px;}
.aff-strip{display:flex;gap:8px;flex-wrap:wrap;}
.aff-badge{padding:4px 10px;border-radius:20px;font-size:.72rem;letter-spacing:.06em;text-transform:lowercase;}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-nav{width:28px;height:28px;border-radius:50%;background:var(--bg2);border:none;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;}
.cal-month{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:400;color:var(--brand);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dow{text-align:center;font-size:.65rem;letter-spacing:.08em;text-transform:lowercase;color:var(--text3);padding-bottom:4px;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:.8rem;border-radius:50%;position:relative;cursor:pointer;}
.cal-day.today{font-weight:500;background:var(--bg2);}
.cal-day.period{background:rgba(176,90,82,.18);}
.cal-day.ovulation{background:rgba(184,131,42,.18);}
.cal-day.fertile{background:rgba(90,138,106,.10);}
.cal-day.intimate::after{content:'♥';position:absolute;bottom:-1px;right:-1px;font-size:.5rem;color:#c05a52;}
.cal-day.other-month{color:var(--text3);}

/* HEART */
.heart-btn{font-size:2rem;background:none;border:none;cursor:pointer;transition:transform .15s;}
.heart-btn:active{transform:scale(1.2);}

/* FLOW */
.flow-opts{display:flex;gap:8px;flex-wrap:wrap;}
.flow-opt{padding:7px 14px;border-radius:20px;border:1px solid var(--bg2);font-size:.78rem;text-transform:lowercase;cursor:pointer;transition:all .2s;background:var(--bg);}
.flow-opt.selected{background:var(--brand);color:var(--white);border-color:var(--brand);}

/* WATER */
.water-btns{display:flex;gap:4px;flex-wrap:wrap;}
.water-drop{font-size:1.3rem;cursor:pointer;opacity:.25;transition:opacity .15s;}
.water-drop.filled{opacity:1;}

/* SLEEP */
.sleep-opts{display:flex;gap:6px;flex-wrap:wrap;}
.sleep-opt{padding:7px 12px;border-radius:20px;border:1px solid var(--bg2);font-size:.78rem;text-transform:lowercase;cursor:pointer;transition:all .2s;background:var(--bg);}
.sleep-opt.selected{background:var(--brand);color:var(--white);border-color:var(--brand);}

/* SYMPTOMS */
.symp-section{margin-bottom:10px;}
.symp-section-label{font-size:.7rem;letter-spacing:.1em;text-transform:lowercase;color:var(--text3);margin-bottom:6px;}
.symp-chips{display:flex;flex-wrap:wrap;gap:0;}

/* TASKS */
.task-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bg2);}
.task-item:last-child{border-bottom:none;}
.task-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--brand-light);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.task-check.done{background:var(--brand);border-color:var(--brand);}
.task-text{flex:1;font-size:.85rem;text-transform:lowercase;}
.task-text.done{text-decoration:line-through;color:var(--text3);}
.task-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.9rem;padding:2px;}
.task-add{display:flex;gap:8px;margin-top:10px;}
.task-input{flex:1;border:1px solid var(--bg2);border-radius:var(--radius-sm);padding:9px 12px;font-family:'Jost',sans-serif;font-size:.85rem;font-weight:300;color:var(--text);background:var(--bg);outline:none;}
.task-input:focus{border-color:var(--brand-light);}
.btn-add{padding:9px 14px;background:var(--brand);color:var(--white);border:none;border-radius:var(--radius-sm);font-size:.8rem;cursor:pointer;}

/* NOTE */
.note-area{width:100%;border:none;background:transparent;font-family:'Jost',sans-serif;font-size:.88rem;font-weight:300;color:var(--text);line-height:1.7;resize:none;outline:none;min-height:70px;}

/* RITUAL */
.ritual-card{background:linear-gradient(135deg,var(--brand) 0%,var(--brand-dark) 100%);color:var(--white);border-radius:var(--radius);padding:20px 18px;margin-bottom:14px;}
.ritual-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:400;margin-bottom:4px;}
.ritual-subtitle{font-size:.75rem;letter-spacing:.1em;text-transform:lowercase;opacity:.8;margin-bottom:16px;}
.ritual-prompt{font-size:.85rem;line-height:1.7;margin-bottom:12px;opacity:.95;}
.ritual-input{width:100%;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:var(--radius-sm);padding:10px 12px;font-family:'Jost',sans-serif;font-size:.85rem;font-weight:300;color:var(--white);resize:none;outline:none;min-height:60px;}
.ritual-input::placeholder{color:rgba(255,255,255,.6);}

/* EDIT LAYOUT */
.edit-layout-btn{width:100%;padding:13px;background:transparent;border:1.5px dashed var(--brand-light);border-radius:var(--radius-sm);font-family:'Jost',sans-serif;font-size:.8rem;letter-spacing:.1em;text-transform:lowercase;color:var(--brand);cursor:pointer;margin-top:4px;}
.block-wrapper{position:relative;transition:opacity .2s;}
.block-wrapper.drag-over{border:2px dashed var(--brand-light);border-radius:var(--radius);padding:2px;}
.drag-handle{display:none;position:absolute;left:-6px;top:50%;transform:translateY(-50%);color:var(--text3);cursor:grab;font-size:1rem;padding:4px;z-index:10;}
.edit-mode .drag-handle{display:flex;align-items:center;}
.block-hide-btn{display:none;position:absolute;right:-6px;top:8px;width:20px;height:20px;border-radius:50%;background:var(--text3);border:none;color:var(--white);font-size:.65rem;cursor:pointer;align-items:center;justify-content:center;}
.edit-mode .block-hide-btn{display:flex;}
.done-editing-btn{width:100%;padding:13px;background:var(--brand);border:none;border-radius:var(--radius-sm);font-family:'Jost',sans-serif;font-size:.8rem;letter-spacing:.1em;text-transform:lowercase;color:var(--white);cursor:pointer;margin-top:4px;display:none;}

/* SUPPORT TAB */
.support-section{margin-bottom:6px;}
.support-acc{width:100%;text-align:left;padding:14px 16px;background:var(--white);border:none;border-radius:var(--radius-sm);font-family:'Jost',sans-serif;font-size:.82rem;letter-spacing:.08em;text-transform:lowercase;color:var(--text2);cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
.support-acc.open{border-radius:var(--radius-sm) var(--radius-sm) 0 0;}
.support-acc-arrow{transition:transform .2s;}
.support-acc.open .support-acc-arrow{transform:rotate(180deg);}
.support-body{background:var(--white);border-radius:0 0 var(--radius-sm) var(--radius-sm);overflow:hidden;max-height:0;transition:max-height .3s ease;}
.support-body.open{max-height:2000px;}
.support-body-inner{padding:0 16px 14px;}
.support-item{padding:10px 0;border-bottom:1px solid var(--bg2);}
.support-item:last-child{border-bottom:none;}
.support-item-name{font-size:.83rem;font-weight:400;color:var(--text);margin-bottom:3px;}
.support-item-why{font-size:.78rem;color:var(--text3);line-height:1.6;}
.support-disclaimer{font-size:.74rem;color:var(--text3);font-style:italic;padding:8px 0;line-height:1.5;}
.symptom-recs{background:linear-gradient(135deg,var(--bg2),var(--white));border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;border-left:3px solid var(--brand);}
.symptom-recs-title{font-size:.72rem;letter-spacing:.1em;text-transform:lowercase;color:var(--brand);margin-bottom:8px;}

/* LOG TAB */
.log-entry{background:var(--white);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;}
.log-date{font-size:.72rem;letter-spacing:.1em;text-transform:lowercase;color:var(--text3);margin-bottom:6px;}
.log-phase-label{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;letter-spacing:.06em;text-transform:lowercase;margin-bottom:8px;}
.log-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px;}
.log-badge{padding:3px 8px;background:var(--bg2);border-radius:10px;font-size:.75rem;text-transform:lowercase;}
.log-note{font-size:.82rem;color:var(--text2);line-height:1.5;margin-top:6px;font-style:italic;}

/* CYCLE TAB */
.cycle-input-row{display:flex;gap:10px;align-items:flex-end;margin-bottom:14px;}
.cycle-input{flex:1;border:1px solid var(--bg2);border-radius:var(--radius-sm);padding:11px 12px;font-family:'Jost',sans-serif;font-size:.9rem;font-weight:300;color:var(--text);background:var(--white);outline:none;}
.cycle-input:focus{border-color:var(--brand-light);}
.btn-sm{padding:11px 16px;background:var(--brand);color:var(--white);border:none;border-radius:var(--radius-sm);font-family:'Jost',sans-serif;font-size:.8rem;cursor:pointer;white-space:nowrap;}
.cycle-list-item{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--bg2);}
.cycle-list-item:last-child{border-bottom:none;}
.cycle-item-dates{font-size:.85rem;color:var(--text2);}
.cycle-item-len{font-size:.78rem;color:var(--text3);}
.cycle-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:1rem;}

/* INSIGHTS TAB */
.insights-banner{border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;text-align:center;}
.insights-banner-label{font-size:.72rem;letter-spacing:.1em;text-transform:lowercase;opacity:.8;margin-bottom:4px;}
.insights-banner-date{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:400;}
.insights-banner-sub{font-size:.8rem;opacity:.85;margin-top:3px;}
.insight-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.insight-stat{background:var(--white);border-radius:var(--radius);padding:14px 16px;text-align:center;}
.insight-stat-val{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--brand);}
.insight-stat-label{font-size:.72rem;letter-spacing:.08em;text-transform:lowercase;color:var(--text3);margin-top:2px;}
.phase-visual{display:grid;grid-template-columns:5fr 8fr 4fr 10fr;border-radius:var(--radius);overflow:hidden;height:36px;margin-bottom:14px;}
.phase-seg{display:flex;align-items:center;justify-content:center;font-size:.65rem;letter-spacing:.06em;text-transform:lowercase;color:var(--white);position:relative;}
.phase-seg-dot{position:absolute;top:50%;width:10px;height:10px;border-radius:50%;background:var(--white);transform:translateY(-50%) translateX(-50%);border:2px solid rgba(0,0,0,.2);}
.hormone-row{padding:10px 0;border-bottom:1px solid var(--bg2);}
.hormone-row:last-child{border-bottom:none;}
.hormone-name{font-size:.82rem;font-weight:400;color:var(--text);margin-bottom:2px;}
.hormone-level{font-size:.72rem;color:var(--brand);font-weight:400;margin-bottom:3px;}
.hormone-desc{font-size:.78rem;color:var(--text3);line-height:1.5;}
.pattern-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bg2);}
.pattern-row:last-child{border-bottom:none;}
.pattern-sym{font-size:.83rem;color:var(--text2);}
.pattern-phases{font-size:.76rem;color:var(--text3);}
.lookup-input-row{display:flex;gap:8px;margin-bottom:14px;}
.lookup-result{background:var(--bg2);border-radius:var(--radius-sm);padding:12px 14px;}
.lookup-result-date{font-size:.82rem;font-weight:400;color:var(--text);margin-bottom:6px;}
.lookup-detail{font-size:.8rem;color:var(--text3);line-height:1.7;}

/* SETTINGS */
.settings-section{margin-bottom:20px;}
.settings-section-title{font-size:.72rem;letter-spacing:.14em;text-transform:lowercase;color:var(--text3);margin-bottom:10px;}

  if (!appState.cycleStarts.length) return 1;

  var start = new Date(latest + 'T00:00:00');
  var today = new Date();
  today.setHours(0,0,0,0);
  var diff = Math.floor((today - start) / 86400000);
  return Math.max(1, diff + 1);
}

  return PHASES.luteal;
}

function getPhaseForDay(day, cycleLen) {

function switchAuthTab(tab) {
  document.getElementById('signin-form').style.display = tab === 'signin' ? '' : 'none';
  document.getElementById('signup-form').style.display = tab === 'signup' ? '' : 'none';
  document.querySelectorAll('.auth-tab').forEach(function(el,i) {
    el.classList.toggle('active', (i===0&&tab==='signin')||(i===1&&tab==='signup'));
  });
  document.getElementById('auth-msg').textContent = '';
  document.getElementById('auth-msg').className = 'auth-msg';
}

function setAuthMsg(msg, isError) {
  var el = document.getElementById('auth-msg');
  el.textContent = msg;
  el.className = 'auth-msg' + (isError ? ' error' : '');
}

async function doSignIn() {
  var email = document.getElementById('signin-email').value.trim();
  var pass = document.getElementById('signin-pass').value;
  if (!email || !pass) return setAuthMsg('please fill in all fields', true);
  setAuthMsg('signing in...');
  try {
    var data = await supaAuth('token?grant_type=password', email, pass);
    if (data.error) return setAuthMsg(data.error_description || data.error, true);
    currentSession = data;
    currentUser = data.user;
    lsSet('session', data);
    setAuthMsg('');
    document.getElementById('auth-overlay').classList.add('hidden');
    await loadAndLaunch();
  } catch(e) {
    setAuthMsg('sign in failed. please try again.', true);
  }
}

async function doSignUp() {
  var email = document.getElementById('signup-email').value.trim();
  var pass = document.getElementById('signup-pass').value;
  if (!email || !pass) return setAuthMsg('please fill in all fields', true);
  if (pass.length < 6) return setAuthMsg('password must be at least 6 characters', true);
  setAuthMsg('creating account...');
  try {
    var data = await supaAuth('signup', email, pass);
    if (data.error) return setAuthMsg(data.error_description || data.error, true);
    if (data.user && !data.session) {
      setAuthMsg('check your email to confirm your account, then sign in.');
      return;
    }
    currentSession = data.session || data;
    currentUser = data.user;
    lsSet('session', currentSession);
    setAuthMsg('');
    document.getElementById('auth-overlay').classList.add('hidden');
    await loadAndLaunch();
  } catch(e) {
    setAuthMsg('sign up failed. please try again.', true);
  }
}

async function doForgot() {
  var email = document.getElementById('signin-email').value.trim();
  if (!email) return setAuthMsg('enter your email first', true);
  try {
    await supaForgot(email);
    setAuthMsg('password reset email sent!');
  } catch(e) {
    setAuthMsg('could not send reset email', true);
  }
}

async function doSignOut() {
  closeProfileMenu();
  currentSession = null;
  currentUser = null;
  lsDel('session');
  Object.keys(localStorage).forEach(function(k) {
    if (k.startsWith('ct5_')) localStorage.removeItem(k);
  });
  document.getElementById('app').classList.add('hidden');
  document.getElementById('auth-overlay').classList.remove('hidden');
}

// LOAD + LAUNCH
// ═══════════════════════════════════════════
async function init() {
  // Try cached session
  var cachedSession = lsGet('session');
  if (cachedSession && cachedSession.access_token) {
    currentSession = cachedSession;
    currentUser = cachedSession.user;
    // Render from cache instantly
    loadFromCache();
    document.getElementById('app').classList.remove('hidden');
    updatePhaseDisplay();
    renderAllTabs();
    checkOnboarding();
    // Sync in background
    syncFromSupabase();
    return;
  }
  // No cache — show auth
  document.getElementById('auth-overlay').classList.remove('hidden');
}

function loadFromCache() {
  var profile = lsGet('appSettings');
  if (profile) Object.assign(appState.profile, profile);
  var cycles = lsGet('pastCycles');
  if (cycles) appState.cycleStarts = cycles;
  var days = lsGet('dayData');
  if (days) appState.dayLogs = days;
  var rituals = lsGet('rituals');
  if (rituals) appState.ritualLogs = rituals;
  var custom = lsGet('customSettings');
  if (custom) appState.customSettings = custom;
  if (lsGet('onboarded')) appState.profile.onboarded = true;
}

async function loadAndLaunch() {
  loadFromCache();
  document.getElementById('app').classList.remove('hidden');
  updatePhaseDisplay();
  renderAllTabs();
  checkOnboarding();
  await syncFromSupabase();
}

async function syncFromSupabase() {
  if (!currentSession || !currentUser) return;
  var uid = currentUser.id;
  try {
    var results = await Promise.all([
      supa('profiles?id=eq.' + uid + '&select=*', 'GET'),
      supa('cycle_starts?user_id=eq.' + uid + '&select=*&order=start_date.asc', 'GET'),
      supa('day_logs?user_id=eq.' + uid + '&select=*', 'GET'),
      supa('ritual_logs?user_id=eq.' + uid + '&select=*', 'GET'),
      supa('custom_settings?id=eq.' + uid + '&select=*', 'GET')
    ]);
    // Profile
    if (results[0] && results[0][0]) {
      var p = results[0][0];
      appState.profile.app_name = p.app_name || 'The Sacred Cycle';
      appState.profile.greeting = p.greeting || 'welcome back';
      appState.profile.cycle_len = p.cycle_len || 28;
      appState.profile.onboarded = !!p.onboarded;
      appState.profile.block_order = p.block_order;
      appState.profile.hidden_blocks = p.hidden_blocks;
      appState.profile.reminder_time = p.reminder_time;
      lsSet('appSettings', appState.profile);
    }
    // Cycle starts
    if (results[1]) {
      appState.cycleStarts = results[1];
      lsSet('pastCycles', appState.cycleStarts);
    }
    // Day logs
    if (results[2]) {
      var dMap = {};
      results[2].forEach(function(d) { dMap[d.log_date] = d; });
      appState.dayLogs = dMap;
      lsSet('dayData', appState.dayLogs);
    }
    // Ritual logs
    if (results[3]) {
      var rMap = {};
      results[3].forEach(function(r) { rMap[r.log_date] = r; });
      appState.ritualLogs = rMap;
      lsSet('rituals', appState.ritualLogs);
    }
    // Custom settings
    if (results[4] && results[4][0]) {
      var cs = results[4][0];
      appState.customSettings = cs;
      lsSet('customSettings', cs);
    }
    lsSet('onboarded', appState.profile.onboarded);
    updatePhaseDisplay();
    renderAllTabs();
    checkOnboarding();
  } catch(e) {
    console.log('sync error', e);
  }
}

    html += '<button class="btn-ob" onclick="obNext()">continue →</button>';
    html += '</div>';
  } else if (obStep === 2) {
    html += '<div class="ob-step">';
    html += '<div class="ob-step-num">step 2 of 3</div>';
    html += '<div class="ob-title">anchor your cycle</div>';
    html += '<div class="ob-sub">When did your most recent period begin? And how long is your typical cycle?</div>';
    html += '<label class="ob-label">cycle start date (day 1 of last period)</label>';
    html += '<input id="ob-start" class="ob-input" type="date" value="' + obData.cycleStart + '">';
    html += '<label class="ob-label">average cycle length (days)</label>';
    html += '<input id="ob-len" class="ob-input" type="number" min="21" max="35" value="' + obData.cycleLen + '">';
    html += '<button class="btn-ob" onclick="obNext()">continue →</button>';
    html += '</div>';
  } else if (obStep === 3) {
    html += '<div class="ob-step" style="text-align:center;">';
    html += '<div style="font-size:3rem;margin-bottom:16px;">🌙</div>';
    html += '<div class="ob-title">you\'re all set</div>';

    html += '<button class="btn-ob" onclick="obFinish()">enter my cycle →</button>';
    html += '</div>';
  }
  document.getElementById('ob-content').innerHTML = html;

function obNext() {
  if (obStep === 1) {
    var nameEl = document.getElementById('ob-name');
    var greetEl = document.getElementById('ob-greeting');
    if (nameEl) obData.appName = nameEl.value || 'The Sacred Cycle';
    if (greetEl) obData.greeting = greetEl.value || 'welcome back';
  }
  if (obStep === 2) {
    var startEl = document.getElementById('ob-start');
    var lenEl = document.getElementById('ob-len');
    if (startEl) obData.cycleStart = startEl.value;
    if (lenEl) obData.cycleLen = parseInt(lenEl.value) || 28;
    if (!obData.cycleStart) { alert('please enter a cycle start date'); return; }
  }
  obStep++;
  if (obStep > 3) obStep = 3;
  renderObStep();
}

async function obFinish() {
  appState.profile.app_name = obData.appName;
  appState.profile.greeting = obData.greeting;
  appState.profile.cycle_len = obData.cycleLen;
  appState.profile.onboarded = true;
  lsSet('appSettings', appState.profile);
  lsSet('onboarded', true);

  if (obData.cycleStart && currentUser) {
    var entry = { user_id: currentUser.id, start_date: obData.cycleStart, is_current: true };
    appState.cycleStarts = [entry];
    lsSet('pastCycles', appState.cycleStarts);
    // Save to supabase
    try {
      await supa('cycle_starts', 'POST', entry);
      await supa('profiles?id=eq.' + currentUser.id, 'PATCH', {
        app_name: obData.appName, greeting: obData.greeting,
        cycle_len: obData.cycleLen, onboarded: true
      });
    } catch(e) { console.log('ob save err', e); }
  }

  document.getElementById('ob-overlay').classList.add('hidden');
  updatePhaseDisplay();
  renderAllTabs();
}

  document.getElementById('header-greeting').textContent = appState.profile.greeting || 'welcome back';

var DEFAULT_BLOCK_ORDER = ['affirmation','ritual','calendar','intimacy','mood','flow','fluids','sleep','symptoms','tasks','note'];

function getBlockOrder() {
  if (appState.profile.block_order) {
    try { return JSON.parse(appState.profile.block_order); } catch(e) {}
  }
  return DEFAULT_BLOCK_ORDER.slice();
}

function getHiddenBlocks() {
  if (appState.profile.hidden_blocks) {
    try { return JSON.parse(appState.profile.hidden_blocks); } catch(e) {}
  }
  return [];
}

function getMoodEmojis() {
  if (appState.customSettings && appState.customSettings.custom_mood_emojis) {
    try {
      var v = appState.customSettings.custom_mood_emojis;
      return typeof v === 'string' ? JSON.parse(v) : v;
    } catch(e) {}
  }
  return DEFAULT_MOOD_EMOJIS.slice();
}

function getMoodWords() {
  if (appState.customSettings && appState.customSettings.custom_mood_words) {
    try {
      var v = appState.customSettings.custom_mood_words;
      return typeof v === 'string' ? JSON.parse(v) : v;
    } catch(e) {}
  }
  return DEFAULT_MOOD_WORDS.slice();
}

function getSymptoms() {
  var base = {
    general: DEFAULT_SYMPTOMS.general.slice(),
    ovulation: DEFAULT_SYMPTOMS.ovulation.slice(),
    luteal: DEFAULT_SYMPTOMS.luteal.slice()
  };
  if (appState.customSettings && appState.customSettings.custom_symptoms) {
    try {
      var v = appState.customSettings.custom_symptoms;
      var cs = typeof v === 'string' ? JSON.parse(v) : v;
      if (cs && cs.general) cs.general.forEach(function(s) { base.general.push(s); });
      if (cs && cs.ovulation) cs.ovulation.forEach(function(s) { base.ovulation.push(s); });
      if (cs && cs.luteal) cs.luteal.forEach(function(s) { base.luteal.push(s); });
    } catch(e) {}
  }
  return base;
}

function renderToday() {
  var pane = document.getElementById('today-pane');
  var log = getTodayLog();
  var cycleDay = getCycleDay();
  var phase = getPhase(cycleDay, appState.profile.cycle_len);
  var blockOrder = getBlockOrder();
  var hiddenBlocks = getHiddenBlocks();
  var html = '';

  blockOrder.forEach(function(blockId) {
    if (hiddenBlocks.indexOf(blockId) > -1) return;
    html += '<div class="block-wrapper" id="block-' + blockId + '" draggable="false" data-block="' + blockId + '">';
    if (editMode) {
      html += '<div class="drag-handle" draggable="true">⠿</div>';
      html += '<button class="block-hide-btn" onclick="hideBlock(\'' + blockId + '\')">✕</button>';
    }
    html += renderBlock(blockId, log, phase, cycleDay);
    html += '</div>';
  });

  // Hidden block restore chips in edit mode
  if (editMode && hiddenBlocks.length > 0) {
    html += '<div style="margin-bottom:14px;">';
    html += '<div class="section-label">hidden blocks</div>';
    hiddenBlocks.forEach(function(b) {
      html += '<span class="chip chip-sm" onclick="showBlock(\'' + b + '\')" style="margin:3px;">+ ' + b + '</span>';
    });
    html += '</div>';
  }

  if (editMode) {
    html += '<button class="done-editing-btn" style="display:block;" onclick="doneEditing()">done editing</button>';
  } else {
    html += '<button class="edit-layout-btn" onclick="startEditing()">⠿ edit layout</button>';
  }

  pane.innerHTML = html;
  pane.className = 'tab-pane active';
  if (editMode) pane.classList.add('edit-mode');
  attachTodayEvents(log, phase);
}

function renderBlock(blockId, log, phase, cycleDay) {
  if (blockId === 'affirmation') return renderAffirmationBlock(phase, cycleDay);
  if (blockId === 'ritual') return renderRitualBlock(phase, cycleDay);
  if (blockId === 'calendar') return renderCalendarBlock();
  if (blockId === 'intimacy') return renderIntimacyBlock(log);
  if (blockId === 'mood') return renderMoodBlock(log);
  if (blockId === 'flow') return renderFlowBlock(log);
  if (blockId === 'fluids') return renderFluidsBlock(log);
  if (blockId === 'sleep') return renderSleepBlock(log);
  if (blockId === 'symptoms') return renderSymptomsBlock(log);
  if (blockId === 'tasks') return renderTasksBlock(log, phase);
  if (blockId === 'note') return renderNoteBlock(log);
  return '';
}

function renderAffirmationBlock(phase, cycleDay) {
  var affs = AFFIRMATIONS[phase.name] || AFFIRMATIONS.menstrual;
  if (appState.customSettings && appState.customSettings.custom_affirmations) {
    try {
      var ca = appState.customSettings.custom_affirmations;
      var caObj = typeof ca === 'string' ? JSON.parse(ca) : ca;
      if (caObj && caObj[phase.name] && caObj[phase.name].length) affs = caObj[phase.name];
    } catch(e) {}
  }
  var idx = (cycleDay - 1) % affs.length;
  var aff = affs[idx];
  var html = '<div class="card" id="aff-card">';
  html += '<div class="card-header"><span class="card-title">affirmation</span></div>';

function renderCalendarBlock() {
  var html = '<div class="card" id="cal-card">';
  html += '<div class="card-body">';
  html += '<div class="cal-header">';
  html += '<button class="cal-nav" onclick="calPrev()">‹</button>';
  var months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
  html += '<div class="cal-month">' + months[calendarViewDate.getMonth()] + ' ' + calendarViewDate.getFullYear() + '</div>';
  html += '<button class="cal-nav" onclick="calNext()">›</button>';
  html += '</div>';
  html += '<div class="cal-grid">';
  var days = ['su','mo','tu','we','th','fr','sa'];
  days.forEach(function(d) { html += '<div class="cal-dow">' + d + '</div>'; });

  var first = new Date(calendarViewDate.getFullYear(), calendarViewDate.getMonth(), 1);
  var last = new Date(calendarViewDate.getFullYear(), calendarViewDate.getMonth()+1, 0);
  var startDow = first.getDay();
  var today = new Date(); today.setHours(0,0,0,0);

  // Prev month padding
  for (var i = 0; i < startDow; i++) {
    var pd = new Date(calendarViewDate.getFullYear(), calendarViewDate.getMonth(), -startDow + i + 1);
    html += '<div class="cal-day other-month">' + pd.getDate() + '</div>';
  }

  // Get period start dates
  var periodStarts = appState.cycleStarts.map(function(s) { return s.start_date; });
  var cycleLen = appState.profile.cycle_len || 28;

  for (var d = 1; d <= last.getDate(); d++) {
    var thisDate = new Date(calendarViewDate.getFullYear(), calendarViewDate.getMonth(), d);
    var dateStr = dateToString(thisDate);
    var classes = 'cal-day';
    if (thisDate.getTime() === today.getTime()) classes += ' today';

    // Check if period day
    var isPeriod = false;
    var isFertile = false;
    var isOvulation = false;
    periodStarts.forEach(function(ps) {
      var pstart = new Date(ps + 'T00:00:00');
      var diff = Math.floor((thisDate - pstart) / 86400000);
      if (diff >= 0 && diff < 5) isPeriod = true;
      var ovDay = Math.round(cycleLen / 2);
      if (diff >= (ovDay-6) && diff <= (ovDay-1)) isFertile = true;
      if (diff === (ovDay-1)) isOvulation = true;
    });

    if (isPeriod) classes += ' period';
    else if (isOvulation) classes += ' ovulation';
    else if (isFertile) classes += ' fertile';

    // Check intimate
    var dl = appState.dayLogs[dateStr];
    if (dl && dl.intimate) classes += ' intimate';

    html += '<div class="' + classes + '">' + d + '</div>';
  }

  html += '</div>';
  html += '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;">';
  html += '<span style="font-size:.7rem;color:#b05a52;">🔴 period &nbsp; </span>';
  html += '<span style="font-size:.7rem;color:#5a8a6a;">🟢 fertile &nbsp; </span>';
  html += '<span style="font-size:.7rem;color:#b8832a;">🟡 ovulation &nbsp; </span>';
  html += '<span style="font-size:.7rem;color:#c05a52;">♥ intimate</span>';
  html += '</div>';
  html += '</div></div>';
  return html;
}

  var log = getTodayLog();

function toggleTask(i) {
  var log = getTodayLog();
  log.tasks[i].done = !log.tasks[i].done;

function deleteTask(i) {
  var log = getTodayLog();
  log.tasks.splice(i,1);

  reRenderBlock('tasks');

function addTask() {
  var inp = document.getElementById('task-input');
  if (!inp || !inp.value.trim()) return;
  var log = getTodayLog();
  if (!log.tasks) log.tasks = [];
  log.tasks.push({ text: inp.value.trim().toLowerCase(), done: false });

  reRenderBlock('tasks');

function addTaskFromSuggestion(text) {
  var log = getTodayLog();
  if (!log.tasks) log.tasks = [];
  if (log.tasks.some(function(t) { return t.text === text; })) return;
  log.tasks.push({ text: text, done: false });
  saveTodayLog();
  reRenderBlock('tasks');
}

function renderLog() {
  var pane = document.getElementById('log-pane');
  var html = '';

  // Today's summary
  var log = getTodayLog();
  var cycleDay = getCycleDay();
  var phase = getPhase(cycleDay, appState.profile.cycle_len);
  var today = todayStr();

  html += '<div style="margin-bottom:6px;"><span class="section-label">today</span></div>';
  html += renderLogEntry(log, today, phase, cycleDay, true);

  // History
  var allDates = Object.keys(appState.dayLogs).filter(function(d) { return d !== today; }).sort().reverse();
  if (allDates.length > 0) {
    html += '<div style="margin-top:20px;margin-bottom:6px;"><span class="section-label">history</span></div>';
    allDates.forEach(function(d) {
      var dLog = appState.dayLogs[d];
      if (!dLog) return;
      // Calculate cycle day for this date
      var dDate = new Date(d + 'T00:00:00');
      var dCycleDay = 1;
      if (appState.cycleStarts.length) {
        var starts = appState.cycleStarts.map(function(s) { return s.start_date; }).sort();
        var closest = null;
        starts.forEach(function(s) {
          var sDate = new Date(s + 'T00:00:00');
          if (sDate <= dDate && (!closest || sDate > new Date(closest + 'T00:00:00'))) closest = s;
        });
        if (closest) {
          var diff = Math.floor((dDate - new Date(closest + 'T00:00:00')) / 86400000);
          dCycleDay = diff + 1;
        }
      }
      var dPhase = getPhase(dCycleDay, appState.profile.cycle_len);
      html += renderLogEntry(dLog, d, dPhase, dCycleDay, false);
    });
  }

  pane.innerHTML = html;
}

function renderLogEntry(log, dateStr, phase, cycleDay, isToday) {
  var dDate = new Date(dateStr + 'T00:00:00');
  var months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  var dateDisplay = months[dDate.getMonth()] + ' ' + dDate.getDate() + ', ' + dDate.getFullYear();
  if (isToday) dateDisplay = 'today — ' + dateDisplay;

  var tasks = log.tasks ? (typeof log.tasks === 'string' ? JSON.parse(log.tasks) : log.tasks) : [];
  var symptoms = log.symptoms ? (typeof log.symptoms === 'string' ? JSON.parse(log.symptoms) : log.symptoms) : [];
  var moodEmoji = log.mood_emoji ? (typeof log.mood_emoji === 'string' ? JSON.parse(log.mood_emoji) : log.mood_emoji) : [];
  var moodWords = log.mood_words ? (typeof log.mood_words === 'string' ? JSON.parse(log.mood_words) : log.mood_words) : [];
  var doneTasks = tasks.filter(function(t) { return t.done; });

  var html = '<div class="log-entry">';
  html += '<div class="log-date">' + dateDisplay + '</div>';
  html += '<span class="log-phase-label" style="background:' + phase.bg + ';color:' + phase.color + ';">' + phase.moon + ' ' + phase.name + ' · day ' + cycleDay + '</span>';

  html += '<div class="log-row">';
  if (log.flow) html += '<span class="log-badge">🩸 ' + log.flow + '</span>';
  if (log.sleep) html += '<span class="log-badge">💤 ' + log.sleep + '</span>';
  if (log.water) html += '<span class="log-badge">💧 ' + log.water + '/8</span>';
  if (log.intimate) html += '<span class="log-badge">♥ intimate</span>';
  html += '</div>';

  if (moodEmoji.length || moodWords.length) {
    html += '<div class="log-row">';
    moodEmoji.forEach(function(e) { html += '<span class="log-badge">' + e + '</span>'; });
    moodWords.slice(0,3).forEach(function(w) { html += '<span class="log-badge">' + w + '</span>'; });
    html += '</div>';
  }

  if (symptoms.length) {
    html += '<div class="log-row">';
    symptoms.slice(0,4).forEach(function(s) { html += '<span class="log-badge">' + s + '</span>'; });
    if (symptoms.length > 4) html += '<span class="log-badge">+' + (symptoms.length-4) + ' more</span>';
    html += '</div>';
  }

  if (tasks.length) {
    html += '<div class="log-row"><span class="log-badge">✓ ' + doneTasks.length + '/' + tasks.length + ' tasks</span></div>';
  }

  if (log.note && log.note.trim()) {
    var noteSnip = log.note.trim().slice(0,100);
    if (log.note.length > 100) noteSnip += '...';
    html += '<div class="log-note">"' + noteSnip + '"</div>';
  }

  html += '</div>';
  return html;
}

function getCurrentCycleStart() {
  if (!appState.cycleStarts.length) return '';
  var sorted = appState.cycleStarts.map(function(s) { return s.start_date; }).sort();
  return sorted[sorted.length-1];
}

async function setCurrentCycle() {
  var val = document.getElementById('current-cycle-input').value;
  if (!val) return;
  // Remove existing current
  appState.cycleStarts = appState.cycleStarts.filter(function(s) { return s.start_date !== val; });
  var entry = { user_id: currentUser ? currentUser.id : '', start_date: val, is_current: true };
  appState.cycleStarts.push(entry);
  lsSet('pastCycles', appState.cycleStarts);
  updatePhaseDisplay();
  renderCycle();
  renderToday();
  if (currentUser) {
    showSync('saving');
    try {
      await supa('cycle_starts?user_id=eq.' + currentUser.id + '&start_date=eq.' + val, 'DELETE');
      await supa('cycle_starts', 'POST', entry);
      showSync('saved');
    } catch(e) { showSync('error'); }
  }
}

async function addPastCycle() {
  var val = document.getElementById('past-cycle-input').value;
  if (!val) return;
  if (appState.cycleStarts.some(function(s) { return s.start_date === val; })) return;
  var entry = { user_id: currentUser ? currentUser.id : '', start_date: val, is_current: false };
  appState.cycleStarts.push(entry);
  lsSet('pastCycles', appState.cycleStarts);
  renderCycle();
  if (currentUser) {
    showSync('saving');
    try {
      await supa('cycle_starts', 'POST', entry);
      showSync('saved');
    } catch(e) { showSync('error'); }
  }
}

async function deleteCycle(startDate) {
  appState.cycleStarts = appState.cycleStarts.filter(function(s) { return s.start_date !== startDate; });
  lsSet('pastCycles', appState.cycleStarts);
  updatePhaseDisplay();
  renderCycle();
  if (currentUser) {
    showSync('saving');
    try {
      await supa('cycle_starts?user_id=eq.' + currentUser.id + '&start_date=eq.' + startDate, 'DELETE');
      showSync('saved');
    } catch(e) { showSync('error'); }
  }
}

function getSymptomPatterns() {
  var phaseCounts = {};
  Object.keys(appState.dayLogs).forEach(function(d) {
    var log = appState.dayLogs[d];
    if (!log || !log.symptoms) return;
    var syms = typeof log.symptoms === 'string' ? JSON.parse(log.symptoms) : log.symptoms;
    if (!syms || !syms.length) return;
    var dDate = new Date(d + 'T00:00:00');
    var dCycleDay = 1;
    if (appState.cycleStarts.length) {
      var starts = appState.cycleStarts.map(function(s) { return s.start_date; }).sort();
      var closest = null;
      starts.forEach(function(s) {
        var sDate = new Date(s + 'T00:00:00');
        if (sDate <= dDate && (!closest || sDate > new Date(closest + 'T00:00:00'))) closest = s;
      });
      if (closest) {
        dCycleDay = Math.floor((dDate - new Date(closest + 'T00:00:00')) / 86400000) + 1;
      }
    }
    var pName = getPhase(dCycleDay, appState.profile.cycle_len).name;
    syms.forEach(function(s) {
      if (!phaseCounts[s]) phaseCounts[s] = {};
      phaseCounts[s][pName] = (phaseCounts[s][pName] || 0) + 1;
    });
  });

  return Object.keys(phaseCounts).slice(0,8).map(function(sym) {
    var phases = Object.keys(phaseCounts[sym]).sort(function(a,b) {
      return phaseCounts[sym][b] - phaseCounts[sym][a];
    });
    return { symptom: sym, phases: phases };
  });
}

      var sDate = new Date(s + 'T00:00:00');
      if (sDate <= dDate && (!closest || sDate > new Date(closest + 'T00:00:00'))) closest = s;
    });
    if (closest) {
      dCycleDay = Math.floor((dDate - new Date(closest + 'T00:00:00')) / 86400000) + 1;
    }
  }
  var dPhase = getPhase(dCycleDay, appState.profile.cycle_len);

    if (log.flow) html += '🩸 flow: ' + log.flow + '<br>';
    if (log.sleep) html += '💤 sleep: ' + log.sleep + '<br>';
    if (log.water) html += '💧 water: ' + log.water + '/8<br>';
    if (log.intimate) html += '♥ intimacy logged<br>';
    if (moods.length) html += '🌸 mood: ' + moods.join(' ') + '<br>';
    if (syms.length) html += '⚡ symptoms: ' + syms.join(', ') + '<br>';
    if (tasks.length) {
      var done = tasks.filter(function(t) { return t.done; }).length;
      html += '✓ tasks: ' + done + '/' + tasks.length + '<br>';

  } else {

  }

    ['q0','q1','q2','q3'].forEach(function(k) {

    });
  }
  html += '</div></div>';
  resultEl.innerHTML = html;
}

  html += '<div class="settings-section">';
  html += '<div class="settings-section-title">mood emojis</div>';
  html += '<div id="set-mood-emoji-list">';
  moodEmojis.forEach(function(e, i) {
    html += '<span class="settings-chip">' + e.emoji + ' ' + e.label;
    html += '<button class="settings-chip-del" onclick="removeMoodEmoji(' + i + ')">✕</button></span>';
  });
  html += '</div>';
  html += '<div class="settings-add-row">';
  html += '<input class="settings-add-input" id="set-new-emoji" placeholder="emoji"  style="max-width:60px;">';
  html += '<input class="settings-add-input" id="set-new-emoji-label" placeholder="label">';
  html += '<button class="btn-sm" onclick="addMoodEmoji()">+</button>';
  html += '</div></div>';

  // Mood words
  var moodWords = getMoodWords();
  html += '<div class="settings-section">';
  html += '<div class="settings-section-title">mood words</div>';
  html += '<div id="set-mood-word-list">';
  moodWords.forEach(function(w, i) {
    html += '<span class="settings-chip">' + w;
    html += '<button class="settings-chip-del" onclick="removeMoodWord(' + i + ')">✕</button></span>';
  });
  html += '</div>';
  html += '<div class="settings-add-row">';
  html += '<input class="settings-add-input" id="set-new-word" placeholder="new mood word">';
  html += '<button class="btn-sm" onclick="addMoodWord()">+</button>';
  html += '</div></div>';

  // Custom symptoms
  html += '<div class="settings-section">';
  html += '<div class="settings-section-title">custom symptoms</div>';
  html += '<div class="section-sel">';
  ['general','ovulation','luteal'].forEach(function(s) {
    html += '<span class="section-sel-opt' + (settingsPhaseTab===s?' active':'') + '" onclick="setSymSection(\'' + s + '\')">' + s + '</span>';
  });
  html += '</div>';
  var customSyms = {};
  if (cs.custom_symptoms) {
    try { customSyms = typeof cs.custom_symptoms === 'string' ? JSON.parse(cs.custom_symptoms) : cs.custom_symptoms; } catch(e) {}
  }
  var curCustomSyms = (customSyms && customSyms[settingsPhaseTab]) || [];
  html += '<div id="set-sym-list">';
  curCustomSyms.forEach(function(s, i) {
    html += '<span class="settings-chip">' + s.emoji + ' ' + s.name;
    html += '<button class="settings-chip-del" onclick="removeCustomSym(' + i + ')">✕</button></span>';
  });
  html += '</div>';
  html += '<div class="settings-add-row">';
  html += '<input class="settings-add-input" id="set-sym-emoji" placeholder="emoji" style="max-width:60px;">';
  html += '<input class="settings-add-input" id="set-sym-name" placeholder="symptom name">';
  html += '<button class="btn-sm" onclick="addCustomSym()">+</button>';
  html += '</div></div>';

  // Work tasks per phase
  html += '<div class="settings-section">';
  html += '<div class="settings-section-title">work suggestions per phase</div>';
  html += '<div class="settings-phase-tabs">';
  ['menstrual','follicular','ovulatory','luteal'].forEach(function(p) {
    html += '<span class="settings-phase-tab' + (settingsPhaseTab===p?' active':'') + '" onclick="setSettingsPhase(\'' + p + '\')">' + p + '</span>';
  });
  html += '</div>';
  var customTasks = {};
  if (cs.custom_tasks) {
    try { customTasks = typeof cs.custom_tasks === 'string' ? JSON.parse(cs.custom_tasks) : cs.custom_tasks; } catch(e) {}
  }
  var curTasks = (customTasks && customTasks[settingsPhaseTab]) || DEFAULT_TASKS[settingsPhaseTab] || [];
  html += '<div id="set-task-list">';
  curTasks.forEach(function(t, i) {
    html += '<span class="settings-chip">' + t;
    html += '<button class="settings-chip-del" onclick="removeTask(\'' + settingsPhaseTab + '\',' + i + ')">✕</button></span>';
  });
  html += '</div>';
  html += '<div class="settings-add-row">';
  html += '<input class="settings-add-input" id="set-new-task" placeholder="new work suggestion">';
  html += '<button class="btn-sm" onclick="addTask2()">+</button>';
  html += '</div></div>';

  // Affirmations
  html += '<div class="settings-section">';
  html += '<div class="settings-section-title">affirmations per phase</div>';
  html += '<div class="settings-phase-tabs">';
  ['menstrual','follicular','ovulatory','luteal'].forEach(function(p) {
    html += '<span class="settings-phase-tab' + (settingsPhaseTab===p?' active':'') + '" onclick="setSettingsPhase(\'' + p + '\')">' + p + '</span>';
  });
  html += '</div>';
  var customAffs = {};
  if (cs.custom_affirmations) {
    try { customAffs = typeof cs.custom_affirmations === 'string' ? JSON.parse(cs.custom_affirmations) : cs.custom_affirmations; } catch(e) {}
  }
  var curAffs = (customAffs && customAffs[settingsPhaseTab]) || AFFIRMATIONS[settingsPhaseTab] || [];
  html += '<div id="set-aff-list">';
  curAffs.forEach(function(a, i) {
    html += '<span class="settings-chip" style="max-width:100%;white-space:normal;">' + a.slice(0,60) + (a.length>60?'...':'');
    html += '<button class="settings-chip-del" onclick="removeAff(\'' + settingsPhaseTab + '\',' + i + ')">✕</button></span>';
  });
  html += '</div>';
  html += '<div class="settings-add-row" style="flex-direction:column;">';
  html += '<textarea class="settings-add-input" id="set-new-aff" placeholder="new affirmation" rows="2" style="width:100%;resize:none;"></textarea>';
  html += '<button class="btn-sm" onclick="addAff()" style="align-self:flex-start;margin-top:6px;">+</button>';
  html += '</div></div>';

  document.getElementById('settings-content').innerHTML = html;
}

function setSettingsPhase(p) {
  settingsPhaseTab = p;
  renderSettings();
}

function setSymSection(s) {
  settingsPhaseTab = s;
  renderSettings();
}

async function saveBasicSettings() {
  appState.profile.app_name = document.getElementById('set-appname').value || 'The Sacred Cycle';
  appState.profile.greeting = document.getElementById('set-greeting').value || 'welcome back';
  appState.profile.cycle_len = parseInt(document.getElementById('set-cyclelen').value) || 28;
  appState.profile.reminder_time = document.getElementById('set-reminder').value || null;
  lsSet('appSettings', appState.profile);
  updatePhaseDisplay();
  if (currentUser) {
    showSync('saving');
    try {
      await supa('profiles?id=eq.' + currentUser.id, 'PATCH', {
        app_name: appState.profile.app_name, greeting: appState.profile.greeting,
        cycle_len: appState.profile.cycle_len, reminder_time: appState.profile.reminder_time
      });
      showSync('saved');
    } catch(e) { showSync('error'); }
  }
}

function getCustomSettings() {
  var cs = appState.customSettings || {};
  return {
    custom_tasks: cs.custom_tasks ? (typeof cs.custom_tasks === 'string' ? JSON.parse(cs.custom_tasks) : cs.custom_tasks) : {},
    custom_affirmations: cs.custom_affirmations ? (typeof cs.custom_affirmations === 'string' ? JSON.parse(cs.custom_affirmations) : cs.custom_affirmations) : {},
    custom_symptoms: cs.custom_symptoms ? (typeof cs.custom_symptoms === 'string' ? JSON.parse(cs.custom_symptoms) : cs.custom_symptoms) : {},
    custom_mood_emojis: cs.custom_mood_emojis ? (typeof cs.custom_mood_emojis === 'string' ? JSON.parse(cs.custom_mood_emojis) : cs.custom_mood_emojis) : DEFAULT_MOOD_EMOJIS.slice(),
    custom_mood_words: cs.custom_mood_words ? (typeof cs.custom_mood_words === 'string' ? JSON.parse(cs.custom_mood_words) : cs.custom_mood_words) : DEFAULT_MOOD_WORDS.slice()
  };
}

async function saveCustomSettings() {
  lsSet('customSettings', appState.customSettings);
  if (currentUser) {
    showSync('saving');
    try {
      var toSave = {};
      ['custom_tasks','custom_affirmations','custom_symptoms','custom_mood_emojis','custom_mood_words'].forEach(function(k) {
        var v = appState.customSettings[k];
        toSave[k] = typeof v === 'string' ? v : JSON.stringify(v);
      });
      await supa('custom_settings?id=eq.' + currentUser.id, 'PATCH', toSave);
      showSync('saved');
    } catch(e) { showSync('error'); }
  }
}

function removeMoodEmoji(i) {
  var emojis = getMoodEmojis();
  emojis.splice(i,1);
  if (!appState.customSettings) appState.customSettings = {};
  appState.customSettings.custom_mood_emojis = emojis;
  saveCustomSettings();
  renderSettings();
}

function addMoodEmoji() {
  var emoji = document.getElementById('set-new-emoji').value.trim();
  var label = document.getElementById('set-new-emoji-label').value.trim().toLowerCase();
  if (!emoji || !label) return;
  var emojis = getMoodEmojis();
  emojis.push({ emoji: emoji, label: label });
  if (!appState.customSettings) appState.customSettings = {};
  appState.customSettings.custom_mood_emojis = emojis;
  saveCustomSettings();
  renderSettings();
}

function removeMoodWord(i) {
  var words = getMoodWords();
  words.splice(i,1);
  if (!appState.customSettings) appState.customSettings = {};
  appState.customSettings.custom_mood_words = words;
  saveCustomSettings();
  renderSettings();
}

function addMoodWord() {
  var word = document.getElementById('set-new-word').value.trim().toLowerCase();
  if (!word) return;
  var words = getMoodWords();
  words.push(word);
  if (!appState.customSettings) appState.customSettings = {};
  appState.customSettings.custom_mood_words = words;
  saveCustomSettings();
  renderSettings();
}

function removeCustomSym(i) {
  var cs = getCustomSettings();
  if (!cs.custom_symptoms[settingsPhaseTab]) return;
  cs.custom_symptoms[settingsPhaseTab].splice(i,1);
  if (!appState.customSettings) appState.customSettings = {};
  appState.customSettings.custom_symptoms = cs.custom_symptoms;
  saveCustomSettings();
  renderSettings();
}

function addCustomSym() {
  var emoji = document.getElementById('set-sym-emoji').value.trim();
  var name = document.getElementById('set-sym-name').value.trim().toLowerCase();
  if (!name) return;
  var cs = getCustomSettings();
  if (!cs.custom_symptoms[settingsPhaseTab]) cs.custom_symptoms[settingsPhaseTab] = [];
  cs.custom_symptoms[settingsPhaseTab].push({ emoji: emoji||'💊', name: name });
  if (!appState.customSettings) appState.customSettings = {};
  appState.customSettings.custom_symptoms = cs.custom_symptoms;
  saveCustomSettings();
  renderSettings();
}

function removeTask(phase, i) {
  var cs = getCustomSettings();
  var tasks = cs.custom_tasks[phase] || DEFAULT_TASKS[phase].slice();
  tasks.splice(i,1);
  cs.custom_tasks[phase] = tasks;
  if (!appState.customSettings) appState.customSettings = {};
  appState.customSettings.custom_tasks = cs.custom_tasks;
  saveCustomSettings();
  renderSettings();
}

function addTask2() {
  var task = document.getElementById('set-new-task').value.trim().toLowerCase();
  if (!task) return;
  var cs = getCustomSettings();
  if (!cs.custom_tasks[settingsPhaseTab]) cs.custom_tasks[settingsPhaseTab] = DEFAULT_TASKS[settingsPhaseTab].slice();
  cs.custom_tasks[settingsPhaseTab].push(task);
  if (!appState.customSettings) appState.customSettings = {};
  appState.customSettings.custom_tasks = cs.custom_tasks;
  saveCustomSettings();
  renderSettings();
}

function removeAff(phase, i) {
  var cs = getCustomSettings();
  var affs = cs.custom_affirmations[phase] || AFFIRMATIONS[phase].slice();
  affs.splice(i,1);
  cs.custom_affirmations[phase] = affs;
  if (!appState.customSettings) appState.customSettings = {};
  appState.customSettings.custom_affirmations = cs.custom_affirmations;
  saveCustomSettings();
  renderSettings();
}

function addAff() {
  var aff = document.getElementById('set-new-aff').value.trim();
  if (!aff) return;
  var cs = getCustomSettings();
  if (!cs.custom_affirmations[settingsPhaseTab]) cs.custom_affirmations[settingsPhaseTab] = AFFIRMATIONS[settingsPhaseTab].slice();
  cs.custom_affirmations[settingsPhaseTab].push(aff);
  if (!appState.customSettings) appState.customSettings = {};
  appState.customSettings.custom_affirmations = cs.custom_affirmations;
  saveCustomSettings();
  renderSettings();
}

// ═══════════════════════════════════════════
// EXPORT DATA
// ═══════════════════════════════════════════
function exportData() {
  closeProfileMenu();
  var data = {
    profile: appState.profile,
    cycleStarts: appState.cycleStarts,
    dayLogs: appState.dayLogs,
    ritualLogs: appState.ritualLogs,
    customSettings: appState.customSettings,
    exportedAt: new Date().toISOString()
  };
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'sacred-cycle-data-' + todayStr() + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

  init();
});
