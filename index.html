<!DOCTYPE html>
<!-- BUILD: 2026-04-10 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="The Sacred Cycle">
<meta name="theme-color" content="#fdf0ee">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<title>The Sacred Cycle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- SYNC DOT -->
<div id="sync-dot"></div>

<!-- STARTUP STATUS -->
<div id="boot-status" style="margin:24px auto;max-width:520px;padding:18px;border-radius:18px;background:#fff;border:1px solid #eed2cc;color:#6f3a35;font-family:Jost,system-ui,sans-serif;line-height:1.6;">
  <div style="font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:#b05a52;margin-bottom:6px;">Loading The Sacred Cycle...</div>
  <div id="boot-status-detail" style="font-size:.9rem;">If this message stays here, refresh once. On GitHub Pages, make sure `index.html`, `styles.css`, `manifest.json`, and the full `js` folder were uploaded together.</div>
</div>

<!-- ONBOARDING OVERLAY -->
<div id="ob-overlay" class="overlay hidden">
  <div id="ob-content"></div>
</div>

<!-- SETTINGS OVERLAY -->
<div id="settings-overlay" class="overlay hidden" style="justify-content:flex-start;padding-top:calc(env(safe-area-inset-top)+20px);">
  <div style="width:100%;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <span style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--brand);">settings</span>
      <button onclick="closeSettings()" style="background:none;border:none;font-size:1.2rem;color:var(--text3);cursor:pointer;">✕</button>
    </div>
    <div id="settings-content"></div>
  </div>
</div>

<!-- PROFILE OVERLAY -->
<div id="profile-overlay" onclick="closeProfileMenu()"></div>
<div id="profile-menu">
  <div class="pm-item" onclick="openSettings()">⚙️ settings</div>
  <div class="pm-item" onclick="exportData()">📤 export data</div>
  <div class="pm-item" onclick="importData()">📥 restore from backup</div>
  <div class="pm-item" onclick="showPrivacyPolicy()">🔒 privacy policy</div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">
  <!-- HEADER: greeting + app name, centered -->
  <div id="header">
    <div id="header-greeting" class="header-greeting"></div>
    <div id="header-appname" class="header-appname"></div>
  </div>

  <!-- PHASE PILLS ROW: menstrual pill | season pill | profile btn — all inline -->
  <div id="phase-bar-wrap">
    <div id="phase-pills-row">
      <div id="phase-pill" class="phase-pill-big"></div>
      <div id="season-badge" class="season-pill"></div>
      <button id="header-profile-btn" onclick="toggleProfileMenu()" aria-label="open menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
    </div>
    <div id="fertile-banner" class="fertile-banner" style="display:none;"></div>
    <!-- SEGMENTED CYCLE BAR — edge to edge -->
    <div id="cycle-bar-wrap">
      <div id="cycle-seg-bar">
        <div class="cseg cseg-mens" id="cseg-mens"></div>
        <div class="cseg cseg-foll" id="cseg-foll"></div>
        <div class="cseg cseg-ovul" id="cseg-ovul"></div>
        <div class="cseg cseg-lut"  id="cseg-lut"></div>
        <div id="cycle-dot"></div>
      </div>
      <div id="cycle-bar-labels">
        <span>Day 1</span>
        <span>Day <span id="cycle-len-label">28</span></span>
      </div>
    </div>
  </div>

  <!-- TAB BAR (top, pill style) -->
  <div id="tab-bar">
    <div id="tab-bar-inner">
      <button class="tab-btn active" onclick="switchTab('today')" id="tab-today">today</button>
      <button class="tab-btn" onclick="switchTab('support')" id="tab-support">support</button>
      <button class="tab-btn" onclick="switchTab('log')" id="tab-log">log</button>
      <button class="tab-btn" onclick="switchTab('tasks')" id="tab-tasks">tasks</button>
      <button class="tab-btn" onclick="switchTab('habits')" id="tab-habits">habits</button>
      <button class="tab-btn" onclick="switchTab('insights')" id="tab-insights">insights</button>
    </div>
  </div>

  <div id="tab-content">
    <div id="today-pane" class="tab-pane active"></div>
    <div id="support-pane" class="tab-pane"></div>
    <div id="log-pane" class="tab-pane"></div>
    <div id="tasks-pane" class="tab-pane"></div>
    <div id="cycle-pane" class="tab-pane"></div>
    <div id="habits-pane" class="tab-pane"></div>
    <div id="library-pane" class="tab-pane"></div>
    <div id="insights-pane" class="tab-pane"></div>
  </div>
</div>

<script>
  window.showBootError = function(message) {
    var el = document.getElementById('boot-status');
    var title = el ? el.querySelector('div') : null;
    var detail = document.getElementById('boot-status-detail');
    if (title) title.textContent = 'The Sacred Cycle could not finish loading.';
    if (detail && message) detail.textContent = message;
    if (el) el.style.display = 'block';
  };
  window.hideBootStatus = function() {
    var el = document.getElementById('boot-status');
    if (el) el.style.display = 'none';
  };
  window.addEventListener('error', function(event) {
    window.showBootError('Startup error: ' + (event.message || 'a required app file did not load.'));
  });
  window.addEventListener('unhandledrejection', function(event) {
    window.showBootError('Startup error: ' + ((event.reason && event.reason.message) || 'a required app file did not load.'));
  });
</script>
<script src="state.js?v=202605302204" onerror="showBootError('Could not load state.js. Make sure state.js is in the same GitHub folder as index.html.')"></script>
<script src="storage.js?v=202605302204" onerror="showBootError('Could not load storage.js. Make sure storage.js is in the same GitHub folder as index.html.')"></script>
<script src="cycle.js?v=202605302204" onerror="showBootError('Could not load cycle.js. Make sure cycle.js is in the same GitHub folder as index.html.')"></script>
<script src="data.js?v=202605302204" onerror="showBootError('Could not load data.js. Make sure data.js is in the same GitHub folder as index.html.')"></script>
<script src="app.js?v=202605302204" onerror="showBootError('Could not load app.js. Make sure app.js is in the same GitHub folder as index.html.')"></script>
</body>
</html>
